<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Chronotech Industry Logo</title>
  <desc id="desc">A futuristic badge with a curved time arc and the Chronotech Industry wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="76" y1="54" x2="438" y2="456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111B2E"/>
      <stop offset="1" stop-color="#05080F"/>
    </linearGradient>
    <linearGradient id="arc" x1="118" y1="108" x2="404" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4FBFF"/>
      <stop offset="0.18" stop-color="#7FF4FF"/>
      <stop offset="0.62" stop-color="#A58BFF"/>
      <stop offset="1" stop-color="#F6D18D"/>
    </linearGradient>
    <linearGradient id="text" x1="84" y1="170" x2="428" y2="338" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4FBFF"/>
      <stop offset="0.36" stop-color="#D9F8FF"/>
      <stop offset="0.72" stop-color="#9BEAFF"/>
      <stop offset="1" stop-color="#CBB8FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000814" flood-opacity="0.65"/>
    </filter>
    <path id="topArc" d="M 90 284 A 166 166 0 0 1 422 284" />
    <path id="bottomArc" d="M 422 304 A 166 166 0 0 1 90 304" />
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="124" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="124" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="164" stroke="rgba(127,244,255,0.12)" stroke-width="2"/>
    <circle cx="256" cy="256" r="136" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-dasharray="2 10"/>
    <circle cx="256" cy="256" r="110" stroke="rgba(165,139,255,0.1)" stroke-width="12"/>
  </g>

  <g filter="url(#shadow)">
    <path
      d="M146 256C146 194.1 194.1 146 256 146C317.9 146 366 194.1 366 256C366 317.9 317.9 366 256 366C194.1 366 146 317.9 146 256Z"
      fill="rgba(8,12,20,0.9)"
      stroke="rgba(255,255,255,0.08)"
      stroke-width="2"
    />
    <path
      d="M168 256C168 206.8 206.8 168 256 168C305.2 168 344 206.8 344 256C344 305.2 305.2 344 256 344C206.8 344 168 305.2 168 256Z"
      fill="url(#bg)"
      stroke="rgba(127,244,255,0.08)"
      stroke-width="1.5"
    />
  </g>

  <path
    d="M184 176C214 156 240 148 256 148C306 148 340 184 340 236C340 276 321 308 286 328"
    stroke="url(#arc)"
    stroke-width="16"
    stroke-linecap="round"
  />
  <path
    d="M286 328L307 331L299 311"
    stroke="url(#arc)"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <circle cx="256" cy="256" r="12" fill="#F4FBFF"/>
  <path d="M256 256L256 192" stroke="rgba(244,251,255,0.7)" stroke-width="6" stroke-linecap="round"/>
  <path d="M256 256L296 220" stroke="rgba(127,244,255,0.72)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="256" r="4.5" fill="#05080F"/>

  <text font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="url(#text)" letter-spacing="4">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">CHRONOTECH</textPath>
  </text>
  <text font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="rgba(244,251,255,0.78)" letter-spacing="5">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">INDUSTRY</textPath>
  </text>

  <path d="M108 250H132" stroke="rgba(255,255,255,0.12)" stroke-width="6" stroke-linecap="round"/>
  <path d="M380 250H404" stroke="rgba(255,255,255,0.12)" stroke-width="6" stroke-linecap="round"/>
</svg>
